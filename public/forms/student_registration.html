<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock Student Registration Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f1f5f9; padding: 40px 0; font-family: sans-serif; }
    .form-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); max-width: 600px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-container">
      <h2 class="mb-3 text-primary">Student Registration Form</h2>
      <p class="text-muted">This form is a mock target used for the AI auto-fill demonstration. Review the fields populated by Selenium.</p>
      <hr>
      <form id="registrationForm" onsubmit="event.preventDefault(); document.getElementById('successAlert').style.display='block';">
        <div class="alert alert-success" id="successAlert" style="display: none;" role="alert">
          Form Submitted Successfully to database! (Mock submission)
        </div>
        <div class="mb-3">
          <label for="fullName" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullName" name="fullName" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-3">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phone" name="phone" required>
        </div>
        <div class="mb-3">
          <label for="dob" class="form-label">Date of Birth</label>
          <input type="date" class="form-control" id="dob" name="dob" required>
        </div>
        <div class="mb-3">
          <label for="gender" class="form-label">Gender</label>
          <select class="form-select" id="gender" name="gender" required>
            <option value="">Choose...</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="course" class="form-label">Course</label>
          <select class="form-select" id="course" name="course" required>
            <option value="">Choose...</option>
            <option value="MCA">MCA</option>
            <option value="BCA">BCA</option>
            <option value="MTech">MTech</option>
            <option value="BTech">BTech</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="address" class="form-label">Address</label>
          <textarea class="form-control" id="address" name="address" rows="3" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Submit Application</button>
      </form>
    </div>
  </div>
</body>
</html>

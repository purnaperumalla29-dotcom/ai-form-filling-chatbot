<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock Job Application Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f1f5f9; padding: 40px 0; font-family: sans-serif; }
    .form-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); max-width: 600px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-container">
      <h2 class="mb-3 text-success">Job Application Form</h2>
      <p class="text-muted">This form is a mock target used for the AI job application auto-fill demonstration. Review the fields populated by Selenium.</p>
      <hr>
      <form id="jobForm" onsubmit="event.preventDefault(); document.getElementById('successAlert').style.display='block';">
        <div class="alert alert-success" id="successAlert" style="display: none;" role="alert">
          Application Submitted Successfully! (Mock submission)
        </div>
        <div class="mb-3">
          <label for="fullName" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullName" name="fullName" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-3">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phone" name="phone" required>
        </div>
        <div class="mb-3">
          <label for="position" class="form-label">Applied Position</label>
          <select class="form-select" id="position" name="position" required>
            <option value="">Choose Position...</option>
            <option value="Software Engineer">Software Engineer</option>
            <option value="Frontend Developer">Frontend Developer</option>
            <option value="Backend Developer">Backend Developer</option>
            <option value="QA Engineer">QA Engineer</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="experience" class="form-label">Experience (Years)</label>
          <input type="number" class="form-control" id="experience" name="experience" min="0" required>
        </div>
        <div class="mb-3">
          <label for="skills" class="form-label">Skills</label>
          <input type="text" class="form-control" id="skills" name="skills" placeholder="e.g. Node.js, SQL, Java" required>
        </div>
        <div class="mb-3">
          <label for="resume" class="form-label">Upload Resume (PDF)</label>
          <input type="file" class="form-control" id="resume" name="resume" accept=".pdf" required>
        </div>
        <button type="submit" class="btn btn-success w-100">Submit Application</button>
      </form>
    </div>
  </div>
</body>
</html>

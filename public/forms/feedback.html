<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock Customer Feedback Form</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f1f5f9; padding: 40px 0; font-family: sans-serif; }
    .form-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); max-width: 600px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-container">
      <h2 class="mb-3 text-warning text-dark">Customer Feedback Form</h2>
      <p class="text-muted">This form is a mock target used for the AI customer feedback auto-fill demonstration. Review the fields populated by Selenium.</p>
      <hr>
      <form id="feedbackForm" onsubmit="event.preventDefault(); document.getElementById('successAlert').style.display='block';">
        <div class="alert alert-success" id="successAlert" style="display: none;" role="alert">
          Feedback Submitted Successfully! (Mock submission)
        </div>
        <div class="mb-3">
          <label for="fullName" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullName" name="fullName" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-3">
          <label for="rating" class="form-label">Service Rating</label>
          <select class="form-select" id="rating" name="rating" required>
            <option value="">Select Rating...</option>
            <option value="Excellent">Excellent</option>
            <option value="Good">Good</option>
            <option value="Average">Average</option>
            <option value="Poor">Poor</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="comments" class="form-label">Feedback Comments</label>
          <textarea class="form-control" id="comments" name="comments" rows="3" required></textarea>
        </div>
        <div class="mb-3">
          <label class="form-label d-block">Recommend to Others?</label>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="recommend" id="recommend_yes" value="Yes" required>
            <label class="form-check-label" for="recommend_yes">Yes</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="recommend" id="recommend_no" value="No" required>
            <label class="form-check-label" for="recommend_no">No</label>
          </div>
        </div>
        <button type="submit" class="btn btn-warning w-100 text-dark font-weight-bold">Submit Feedback</button>
      </form>
    </div>
  </div>
</body>
</html>
